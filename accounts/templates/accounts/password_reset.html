{% extends "base.html" %}
{% block content %}
<div class="auth-wrapper">
<div class="auth-card">
<h3>Mot de passe oublié</h3>
<p class="text-muted small">Entrez votre e-mail : un lien de réinitialisation valable 3 jours vous sera envoyé.</p>
<form method="post">{% csrf_token %}{{ form.as_p }}
<button class="btn btn-dark w-100 py-2">Envoyer le lien</button>
</form>
</div>
</div>
{% endblock %}
