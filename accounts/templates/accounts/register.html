{% extends "base.html" %}
{% block content %}
<div class="auth-wrapper">
<div class="auth-card">
<h3><span class="brand-accent">Créer</span> un compte</h3>
<form method="post" id="register-form">{% csrf_token %}{{ form.as_p }}
<div id="email-check-msg" class="small mb-2"></div>
<button class="btn btn-dark w-100 py-2">S'inscrire</button>
</form>
<p class="mt-3 mb-0">Déjà inscrit ? <a href="{% url 'accounts:login' %}">Se connecter</a></p>
</div>
</div>

<script>
(function () {
  const emailInput = document.getElementById('id_email');
  const msg = document.getElementById('email-check-msg');
  if (!emailInput || !msg) return;

  let timer = null;
  emailInput.addEventListener('input', function () {
    clearTimeout(timer);
    const email = emailInput.value.trim();
    if (!email.includes('@')) { msg.textContent = ''; return; }
    msg.textContent = 'Vérification en cours...';
    msg.style.color = 'var(--bn-text-muted)';
    timer = setTimeout(function () {
      fetch('{% url "accounts:check_email" %}?email=' + encodeURIComponent(email))
        .then(r => r.json())
        .then(data => {
          if (data.valid) {
            msg.textContent = '✅ E-mail valide';
            msg.style.color = 'var(--bn-green)';
          } else {
            msg.textContent = '❌ E-mail invalide — ' + data.message;
            msg.style.color = 'var(--bn-red)';
          }
        })
        .catch(() => { msg.textContent = ''; });
    }, 600); // attend que l'utilisateur arrête de taper avant de vérifier
  });
})();
</script>
{% endblock %}
