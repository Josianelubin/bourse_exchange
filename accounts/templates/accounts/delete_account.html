{% extends "base.html" %}
{% block content %}
<div class="card p-4 col-md-6">
<h3 class="text-danger">Supprimer mon compte</h3>
<p>Cette action est <strong>définitive</strong> et irréversible. Assurez-vous d'avoir retiré tous vos fonds au préalable.</p>
<form method="post">{% csrf_token %}{{ form.as_p }}
<button class="btn btn-danger">Supprimer définitivement</button></form>
</div>
{% endblock %}
